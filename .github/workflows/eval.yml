name: RAG Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  evaluate:
    name: Run Ragas evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Restore docs and run ingestion ─────────────────────────────────
      #    Option A: Commit your docs/ folder to the repo (fine for non-sensitive docs)
      #    Option B: Use GitHub Secrets + a download step for private docs
      - name: Run ingestion pipeline
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python ingest.py

      # ── 5. Run Ragas evaluation ───────────────────────────────────────────
      - name: Run evaluation
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python evaluate.py
        # Exit code 1 from evaluate.py automatically fails this step

      # ── 6. Upload eval results as artifact ───────────────────────────────
      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()    # upload even if eval failed, so you can debug
        with:
          name: eval-results-${{ github.run_number }}
          path: eval_results.json
          retention-days: 30

      # ── 7. Post eval scores as a PR comment ──────────────────────────────
      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('eval_results.json', 'utf8'));
            const s = results.scores;
            const emoji = results.passed ? '✅' : '❌';
            const body = `## ${emoji} RAG Evaluation Results

            | Metric | Score | Threshold | Status |
            |--------|-------|-----------|--------|
            | Faithfulness | ${s.faithfulness.toFixed(3)} | 0.70 | ${s.faithfulness >= 0.70 ? '✅' : '❌'} |
            | Answer Relevance | ${s.answer_relevancy.toFixed(3)} | 0.70 | ${s.answer_relevancy >= 0.70 ? '✅' : '❌'} |
            | Context Precision | ${s.context_precision.toFixed(3)} | 0.70 | ${s.context_precision >= 0.70 ? '✅' : '❌'} |

            **Questions evaluated:** ${results.n_questions}
            **Overall:** ${results.passed ? 'PASSED — safe to merge' : 'FAILED — fix quality issues before merging'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
